name: Deploy to AWS CodeDeploy

on:
  push:
    branches: [ main ]

env:
  PROJECT_NAME: cicdproject
  BUCKET_NAME: cicd-codedeploy
  CODE_DEPLOY_APP_NAME: cicdapp
  DEPLOYMENT_GROUP_NAME: cicdapp_deploy

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: corretto
        java-version: '11'

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build with Gradle
      run: ./gradlew build

    - name: Make Zip File
      run: zip -r ./$PROJECT_NAME.zip .
      shell: bash

    - name: Check secrets exist
      run: |
        [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && echo "AWS_ACCESS_KEY_ID OK" || (echo "AWS_ACCESS_KEY_ID EMPTY" && exit 1)
        [ -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && echo "AWS_SECRET_ACCESS_KEY OK" || (echo "AWS_SECRET_ACCESS_KEY EMPTY" && exit 1)
        [ -n "${{ secrets.AWS_REGION }}" ] && echo "AWS_REGION OK" || (echo "AWS_REGION EMPTY" && exit 1)

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Upload to S3
      run: aws s3 cp ./$PROJECT_NAME.zip s3://$BUCKET_NAME/$PROJECT_NAME.zip

    - name: Code Deploy
      run: |
        aws deploy create-deployment \
        --application-name $CODE_DEPLOY_APP_NAME \
        --deployment-group-name $DEPLOYMENT_GROUP_NAME \
        --s3-location bucket=$BUCKET_NAME,bundleType=zip,key=$PROJECT_NAME.zip \
        --region ${{ secrets.AWS_REGION }}